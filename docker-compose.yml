networks:
  sandbox-net:
    name: sandbox-net
    driver: bridge

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend:/app
      - /app/node_modules
    networks:
      - sandbox-net
    environment:
      - NODE_ENV=development
      - AI_SERVICE_URL=http://ollama:11434

  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - sandbox-net
    environment:
      - NODE_ENV=development

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    networks:
      - sandbox-net
    environment:
      - NODE_ENV=development

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    networks:
      - sandbox-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4g
    restart: unless-stopped

  suggetions:
    build:
      context: ./auto-complete
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    networks:
      - sandbox-net
